name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 1. فحص وجود ملف التوقيع أو توليده
    - name: Check or Generate Debug Keystore
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -keypass android -storepass android -dname "CN=Android Debug,O=Android,C=US"
          echo "GENERATED=true" >> $GITHUB_ENV
        else
          echo "GENERATED=false" >> $GITHUB_ENV
        fi

    # 2. رفع ملف التوقيع مع منع الحلقة اللانهائية باستخدام [skip ci]
    - name: Commit Keystore back to Repository
      if: env.GENERATED == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f debug.keystore
        # إضافة [skip ci] تخبر غيت هوب ألا يعيد تشغيل الـ Workflow بسبب هذا الرفع
        git commit -m "chore: persist generated debug.keystore [skip ci]"
        git push

    # 3. بناء التطبيق الذكي (استخدام الـ Wrapper إن وجد، أو الانتقال للـ System Gradle فوراً)
    - name: Build Debug APK
      run: |
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug
        else
          echo "Gradle wrapper not found. Using system gradle."
          gradle assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
