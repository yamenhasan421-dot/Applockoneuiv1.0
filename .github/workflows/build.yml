name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write # Required for GitHub Actions to create releases and push the keystore

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Check or Generate Debug Keystore
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -keypass android -storepass android -dname "CN=Android Debug,O=Android,C=US"
          echo "GENERATED=true" >> $GITHUB_ENV
        else
          echo "GENERATED=false" >> $GITHUB_ENV
        fi

    - name: Commit Keystore back to Repository
      if: env.GENERATED == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f debug.keystore
        git commit -m "chore: persist generated debug.keystore [skip ci]"
        git push

    - name: Build Debug APK
      run: ./gradlew assembleDebug # Changed to gradlew to prevent environment mismatches

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' # Only create a release on actual pushes, not PRs
      with:
        tag_name: v1.2-b${{ github.run_number }} # Dynamic tag (e.g., v1.2-b1, v1.2-b2) so it never errors out
        name: Release v1.2 (Build #${{ github.run_number }})
        body: |
          Automated build for version 1.2.
          - Fixed Android 16 Under-Display fingerprint sensor crash.
          - Optimized lazy-loading for app lists to eliminate scroll lag.
          - Added "Unrestricted" battery usage onboarding prompt.
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
